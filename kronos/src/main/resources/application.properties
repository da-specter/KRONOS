# 📱 Envío de recordatorios por WhatsApp (Meta Cloud API) vía WhatsAppService: recordatorio de
# visitas de seguimiento (aprendiz + instructor) y alertas de bitácora (vence hoy / atrasada).
# Sin token/phone-number-id configurados el servicio queda inactivo (solo log), igual que el
# correo. Los nombres de plantilla deben coincidir EXACTO con las ya aprobadas en Meta Business
# Manager (no se puede mandar texto libre en mensajes que inicia el sistema).
whatsapp.api.token=${WHATSAPP_API_TOKEN:}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.api.version=${WHATSAPP_API_VERSION:v21.0}
whatsapp.pais.codigo=${WHATSAPP_CODIGO_PAIS:57}
whatsapp.plantilla.recordatorio-visita-instructor=${WHATSAPP_PLANTILLA_VISITA_INSTRUCTOR:recordatorio_visita_instructor}
whatsapp.plantilla.recordatorio-visita-aprendiz=${WHATSAPP_PLANTILLA_VISITA_APRENDIZ:recordatorio_visita_aprendiz}
whatsapp.plantilla.bitacora-vence-hoy=${WHATSAPP_PLANTILLA_BITACORA_HOY:bitacora_vence_hoy}
whatsapp.plantilla.bitacora-atrasada=${WHATSAPP_PLANTILLA_BITACORA_ATRASADA:bitacora_atrasada}