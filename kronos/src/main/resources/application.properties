# 🇨🇴 Idioma fijo de la aplicación (mensajes de validación, formatos, etc.)
spring.mvc.locale=es_CO
spring.mvc.locale-resolver=fixed

spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:KRONOS_DEV}
spring.datasource.password=${DB_PASSWORD:KRONOS2026}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.hibernate.ddl-auto=update
# 🚪 Cambio de puerto de KRONOS
server.port=8081

# 📎 Carga de plantillas firmadas por el aprendiz (multipart)
app.upload.dir=${UPLOAD_DIR:uploads/documentos-solicitud}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

