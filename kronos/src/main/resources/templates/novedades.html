<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Novedades</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${usuario.menuNavegacion}, '/novedades')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>📢 Novedades</h1>
                <p>Novedades radicadas por los aprendices dirigidas a ti.</p>
            </div>

            <div th:replace="~{fragments/notificaciones :: campana}"></div>
        </header>

        <section class="dashboard-grid">

            <div class="alert-danger" th:if="${error}" th:text="${error}" style="grid-column: 1 / -1; margin-top: 0;"></div>

            <div th:each="novedad : ${novedades}"
                 style="grid-column: 1 / -1; background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06), 0 20px 40px -8px rgba(15, 23, 42, 0.16); border: 1px solid var(--card-border); margin-top: 10px;">

                <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <p style="font-size: 15px; font-weight: 700; color: var(--text-dark); margin: 0;"
                           th:text="${novedad.remitente.nombre} + ' ' + ${novedad.remitente.apellido}">Nombre Aprendiz</p>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 3px;"
                           th:text="${novedad.tipoNovedad} + ' · ' + ${#temporals.format(novedad.fechaCreacion, 'dd/MM/yyyy HH:mm')}">
                            OTRO · 01/01/2026 10:00
                        </p>
                    </div>
                    <span th:text="${novedad.estadoFiltro}"
                          th:style="${novedad.estadoFiltro.name() == 'RESUELTO'} ? 'background: rgba(5,112,21,0.1); color: var(--verde-sena);' : (${novedad.estadoFiltro.name() == 'RECHAZADO'} ? 'background: rgba(220,38,38,0.1); color: #DC2626;' : 'background: #FEF3C7; color: #B45309;')"
                          style="padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;">
                        SOLICITADO
                    </span>
                </div>

                <div class="inner-status-card" style="margin-top: 14px;">
                    <p style="font-size: 13px; color: var(--text-dark);" th:text="${novedad.descripcion}">Descripción de la novedad</p>
                </div>

                <div th:if="${!#lists.isEmpty(historialPorNovedad.get(novedad.idNovedad))}" style="margin-top: 14px; display: flex; flex-direction: column; gap: 8px;">
                    <div th:each="historial : ${historialPorNovedad.get(novedad.idNovedad)}"
                         style="background: var(--inner-bg); border-radius: 12px; padding: 10px 14px;">
                        <p style="font-size: 12px; color: var(--text-dark); font-weight: 600;"
                           th:text="${historial.usuarioAccion.nombre} + ' — ' + ${historial.accionRealizada}">Adriana Silva — COMENTAR</p>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;" th:text="${historial.comentarioRespuesta}">Comentario</p>
                    </div>
                </div>

                <form th:if="${novedad.estadoFiltro.name() != 'RESUELTO' and novedad.estadoFiltro.name() != 'RECHAZADO'}"
                      th:action="@{'/novedades/' + ${novedad.idNovedad} + '/responder'}" method="post"
                      style="display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--card-border);">
                    <div class="form-group" style="margin-bottom: 0; min-width: 200px; flex: 1;">
                        <label>Respuesta</label>
                        <div class="input-container">
                            <input type="text" name="comentarioRespuesta" maxlength="500" required
                                   style="width: 100%; border: none; outline: none; font-size: 13px; background: transparent; padding: 6px 0;">
                        </div>
                    </div>
                    <div class="form-group" style="margin-bottom: 0; min-width: 150px;">
                        <label>Acción</label>
                        <div class="input-container">
                            <select name="accionRealizada" required style="width: 100%; border: none; outline: none; font-size: 13px; background: transparent; padding: 6px 0;">
                                <option th:each="accion : ${accionesRealizadas}" th:value="${accion}" th:text="${accion}">COMENTAR</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" style="margin-top: 0; padding: 8px 16px; font-size: 12px;">Responder</button>
                </form>
            </div>

            <p th:if="${#lists.isEmpty(novedades)}" class="dashboard-panel" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500;">
                🎉 No tienes novedades pendientes.
            </p>

        </section>
    </main>

    <script th:src="@{/js/workflow.js}"></script>
</body>
</html>
