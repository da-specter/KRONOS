<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Formatos</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${menuNavegacionActual}, '/formatos')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>📁 Formatos</h1>
                <p>Plantillas institucionales agrupadas por tipo de contrato.</p>
            </div>

            <div th:replace="~{fragments/notificaciones :: campana}"></div>
        </header>

        <section class="dashboard-grid">

            <div class="alert-danger" th:if="${error}" th:text="${error}" style="grid-column: 1 / -1; margin-top: 0;"></div>

            <!-- El Aprendiz sube sus formatos diligenciados directamente desde aquí, una vez descargó los de su modalidad -->
            <div class="dashboard-panel" th:if="${solicitudActual != null and solicitudActual.estado.name() == 'FORMATOS_HABILITADOS'}" style="grid-column: 1 / -1; margin-top: 10px;">
                <h3 class="panel-header-title" style="display: flex; align-items: center; gap: 10px;">
                    <span>📤 Sube tus formatos diligenciados</span>
                    <span style="background: rgba(5, 112, 21, 0.1); color: var(--verde-sena); font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;"
                          th:text="${solicitudActual.seccionFormato.nombreSeccion}">Pasantía</span>
                </h3>
                <form th:action="@{/aprendiz/subir-formatos}" method="post" enctype="multipart/form-data"
                      style="margin-top: 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <input type="file" name="archivo" accept=".doc,.docx,.xls,.xlsx" required style="font-size: 13px;">
                    <button type="submit" class="btn-login" style="margin-top: 0; padding: 8px 18px; font-size: 13px;">Subir Formatos</button>
                </form>
            </div>

            <div class="dashboard-panel" style="grid-column: 1 / -1; margin-top: 10px;">
                <h3 class="panel-header-title" style="display: flex; align-items: center; gap: 10px;">
                    <span>📂 Etapa Práctica</span>
                </h3>

                <div style="overflow-x: auto; margin-top: 16px;">
                    <div th:each="plantilla : ${plantillasEtapaPractica}"
                         class="inner-status-card" style="margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px;">
                        <a th:href="${plantilla.rutaArchivoPlantilla}" target="_blank"
                           style="font-weight: 700; color: var(--verde-sena); text-decoration: none; display: flex; align-items: center; gap: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span th:text="${plantilla.nombreDocumento}">Formato</span>
                        </a>
                    </div>

                    <p th:if="${#lists.isEmpty(plantillasEtapaPractica)}"
                       style="text-align: center; padding: 20px; color: var(--text-muted); font-weight: 500; font-size: 13px;">
                        Aún no hay plantillas registradas para esta sección.
                    </p>
                </div>
            </div>

            <div style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 22px; margin-top: 10px;">
                <div th:each="seccion : ${secciones}"
                     style="background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06), 0 20px 40px -8px rgba(15, 23, 42, 0.16); border: 1px solid var(--card-border);">
                    <h3 class="panel-header-title" style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
                        <span th:text="'📂 ' + ${seccion.nombreSeccion}">📂 Pasantía</span>
                    </h3>

                    <div style="margin-top: 14px;">
                        <div th:each="plantilla : ${plantillasPorSeccion.get(seccion.idSeccionFormato)}"
                             class="inner-status-card" style="margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px;">
                            <a th:href="${plantilla.rutaArchivoPlantilla}" target="_blank"
                               style="font-weight: 700; color: var(--verde-sena); text-decoration: none; display: flex; align-items: center; gap: 8px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                <span th:text="${plantilla.nombreDocumento}">Formato</span>
                            </a>
                        </div>

                        <p th:if="${#lists.isEmpty(plantillasPorSeccion.get(seccion.idSeccionFormato))}"
                           style="text-align: center; padding: 20px; color: var(--text-muted); font-weight: 500; font-size: 13px;">
                            Aún no hay plantillas registradas para esta sección.
                        </p>
                    </div>
                </div>
            </div>

        </section>
    </main>

    <script th:src="@{/js/workflow.js}"></script>
</body>
</html>
