<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Validación de Documentos</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${usuario.menuNavegacion}, '/gestor/documentos')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>📄 Validación de Documentos</h1>
                <p>Documentos radicados por los aprendices para su Etapa Productiva.</p>
            </div>

            <div th:replace="~{fragments/notificaciones :: campana}"></div>
        </header>

        <section class="dashboard-grid">

            <div style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 22px; margin-top: 10px;">

                <div th:each="documento : ${documentos}"
                     style="background: #fff; border-radius: 18px; padding: 22px; box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06), 0 20px 40px -8px rgba(15, 23, 42, 0.16); border: 1px solid var(--card-border); display: flex; flex-direction: column; gap: 14px;">

                    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;">
                        <div>
                            <p style="font-size: 15px; font-weight: 700; color: var(--text-dark); margin: 0;"
                               th:text="${documento.solicitud.aprendizFicha.usuario.nombre} + ' ' + ${documento.solicitud.aprendizFicha.usuario.apellido}">
                                Nombre Aprendiz
                            </p>
                            <p style="font-size: 12px; color: var(--text-muted); margin-top: 3px;"
                               th:text="'Ficha ' + ${documento.solicitud.aprendizFicha.ficha.numeroFicha}">
                                Ficha 2555228
                            </p>
                        </div>

                        <span th:text="${documento.estadoValidacion}"
                              th:style="${documento.estadoValidacion.name() == 'APROBADO'} ? 'background: rgba(5,112,21,0.1); color: var(--verde-sena);' : (${documento.estadoValidacion.name() == 'RECHAZADO'} ? 'background: rgba(220,38,38,0.1); color: #DC2626;' : 'background: #FEF3C7; color: #B45309;')"
                              style="padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap;">
                            PENDIENTE
                        </span>
                    </div>

                    <div class="inner-status-card" style="margin: 0;">
                        <p style="font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px;">Documento</p>
                        <p style="font-size: 14px; color: var(--text-dark); font-weight: 700;"
                           th:text="${documento.plantillaFormato != null ? documento.plantillaFormato.nombreDocumento : documento.asunto}">GFPI-F-165</p>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;"
                           th:text="'Radicado: ' + ${#temporals.format(documento.fechaSubida, 'dd/MM/yyyy HH:mm')}">
                            Radicado: 01/01/2026 10:00
                        </p>
                    </div>

                    <a th:href="${documento.rutaArchivoLleno}" target="_blank"
                       style="display: flex; align-items: center; justify-content: center; gap: 8px; background-color: var(--verde-sena); color: #FFFFFF; text-decoration: none; padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 12px rgba(5, 112, 21, 0.15);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Descargar
                    </a>
                </div>

                <p th:if="${#lists.isEmpty(documentos)}" class="dashboard-panel" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500;">
                    Aún no hay documentos radicados por los aprendices.
                </p>

            </div>

        </section>
    </main>

    <script th:src="@{/js/workflow.js}"></script>
</body>
</html>
