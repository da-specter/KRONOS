<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Recuperar Contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

    <div class="bg-watermark">KRONOS</div>

    <div class="main-container">

        <div class="visual-side">
            <div class="logo-container">
                <img th:src="@{/images/LOGO KRONOS.png}" alt="Logo KRONOS">
            </div>
        </div>

        <div class="form-side">

            <div class="mobile-logo-wrapper">
                <img th:src="@{/images/LOGO KRONOS.png}" alt="Logo KRONOS Móvil">
            </div>

            <div class="form-header">
                <div class="user-avatar-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h2>Recuperar Contraseña</h2>
            </div>

            <div class="alert-danger" th:if="${error}" th:text="${error}"></div>

            <form th:action="@{/auth/recuperar/enviar}" method="post" style="display: flex; flex-direction: column;">

                <p class="metodo-recuperacion-hint">Elige cómo quieres recibir tu código de verificación:</p>
                <div class="metodo-recuperacion-opciones">
                    <label class="metodo-opcion">
                        <input type="radio" name="metodo" value="CORREO" checked style="accent-color: var(--verde-oscuro);">
                        <span>✉️ Correo Electrónico</span>
                    </label>
                    <label class="metodo-opcion metodo-opcion-disabled">
                        <input type="radio" name="metodo" value="SMS" disabled>
                        <span>💬 Mensaje de Texto (próximamente)</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="correoElectronico">Correo Electrónico</label>
                    <div class="input-container">
                        <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input id="correoElectronico"
                               name="correoElectronico"
                               type="email"
                               placeholder="Introduce tu correo institucional"
                               required autocomplete="email">
                    </div>
                </div>

                <button type="submit" class="btn-login">Enviar Código</button>

                <a th:href="@{/auth/login}" class="back-to-login-link">← Volver a Iniciar Sesión</a>

            </form>
        </div>

    </div>

</body>
</html>
