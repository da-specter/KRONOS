<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Registro Etapa Productiva</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${usuario.menuNavegacion}, '/gestor/registro-etapa')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>🏢 Registro Etapa Productiva</h1>
                <p>Registra la empresa, el tipo de contrato y las fechas oficiales de la Etapa Productiva.</p>
            </div>

            <div th:replace="~{fragments/notificaciones :: campana}"></div>
        </header>

        <section class="dashboard-grid">

            <div class="alert-danger" th:if="${error}" th:text="${error}" style="grid-column: 1 / -1; margin-top: 0;"></div>

            <div th:each="solicitud : ${solicitudesParaRegistrar}"
                 style="grid-column: 1 / -1; background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06), 0 20px 40px -8px rgba(15, 23, 42, 0.16); border: 1px solid var(--card-border); margin-top: 10px;">

                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <p style="font-size: 16px; font-weight: 700; color: var(--text-dark); margin: 0;"
                           th:text="${solicitud.aprendizFicha.usuario.nombre} + ' ' + ${solicitud.aprendizFicha.usuario.apellido}">Nombre Aprendiz</p>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 3px;"
                           th:text="'Ficha ' + ${solicitud.aprendizFicha.ficha.numeroFicha} + ' · Sol. #' + ${solicitud.idSolicitud} + ' · ' + ${solicitud.seccionFormato.nombreSeccion}">
                            Ficha 2555228 · Sol. #2 · Pasantía
                        </p>
                    </div>
                    <button type="button" th:onclick="'toggleRegistroForm(' + ${solicitud.idSolicitud} + ')'"
                            style="background-color: var(--verde-sena); color: #FFFFFF; border: none; padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(5, 112, 21, 0.15);">
                        Registrar Etapa
                    </button>
                </div>

                <form th:id="'form-registro-' + ${solicitud.idSolicitud}"
                      th:action="@{'/gestor/registro-etapa/' + ${solicitud.idSolicitud}}" method="post"
                      onsubmit="return validarNovedadRegistro(this)"
                      style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--card-border);">

                    <input type="hidden" name="idAprendizFicha" th:value="${solicitud.aprendizFicha.idAprendizFicha}">

                    <p style="font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px;">Datos de la empresa</p>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>NIT</label>
                            <div class="input-container"><input type="text" name="nit" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Nombre de la empresa</label>
                            <div class="input-container"><input type="text" name="nombreEmpresa" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Dirección</label>
                            <div class="input-container"><input type="text" name="direccionEmpresa" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Teléfono</label>
                            <div class="input-container"><input type="text" name="telefonoEmpresa" style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Correo</label>
                            <div class="input-container"><input type="email" name="correoEmpresa" style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Departamento</label>
                            <div class="input-container">
                                <select name="nombreDepartamento" required onchange="filtrarMunicipios(this)"
                                        style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;">
                                    <option value="">Selecciona un departamento</option>
                                    <option th:each="d : ${departamentos}" th:value="${d.nombreDepartamento}"
                                            th:text="${d.nombreDepartamento}" th:attr="data-id=${d.idDepartamento}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Municipio</label>
                            <div class="input-container">
                                <select name="nombreMunicipio" required
                                        style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;">
                                    <option value="">Selecciona un departamento primero</option>
                                    <option th:each="m : ${municipios}" th:value="${m.nombreMunicipio}"
                                            th:text="${m.nombreMunicipio}" th:attr="data-dept=${m.departamento.idDepartamento}" hidden></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <p style="font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px;">Contrato y vigencia</p>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Tipo de contrato</label>
                            <div class="input-container"><input type="text" name="nombreTipoContrato" required placeholder="Ej: Contrato de Aprendizaje" style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Fecha inicio</label>
                            <div class="input-container"><input type="date" name="fechaInicio" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Fecha fin</label>
                            <div class="input-container"><input type="date" name="fechaFin" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                    </div>

                    <p style="font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px;">Jefe inmediato</p>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 18px;">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Nombre</label>
                            <div class="input-container"><input type="text" name="nombreJefeInmediato" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Correo</label>
                            <div class="input-container"><input type="email" name="correoJefeInmediato" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Teléfono</label>
                            <div class="input-container"><input type="text" name="telefonoJefeInmediato" required style="width: 100%; border: none; outline: none; font-size: 14px; background: transparent; padding: 6px 0;"></div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 24px; margin-bottom: 20px;">
                        <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-dark);">
                            <input type="checkbox" name="modalidadOk" style="width: 18px; height: 18px; accent-color: var(--verde-sena); cursor: pointer; margin-right: 8px;">
                            Modalidad aprobada
                        </label>
                        <label style="display: flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-dark);">
                            <input type="checkbox" name="formatosOk" style="width: 18px; height: 18px; accent-color: var(--verde-sena); cursor: pointer; margin-right: 8px;">
                            Formatos aprobados
                        </label>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Novedad (obligatoria si rechazas modalidad o formatos)</label>
                        <div class="input-container">
                            <textarea name="observacion" rows="2" placeholder="Escribe el motivo del rechazo para notificar al aprendiz..."
                                      style="width: 100%; border: none; outline: none; font-size: 13px; background: transparent; padding: 6px 0; resize: vertical;"></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" style="margin-top: 0; padding: 10px 24px; font-size: 13px;">Confirmar Registro</button>
                </form>
            </div>

            <p th:if="${#lists.isEmpty(solicitudesParaRegistrar)}" class="dashboard-panel" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500;">
                🎉 No hay solicitudes pendientes de registrar como Etapa Productiva.
            </p>

        </section>
    </main>

    <script>
        function toggleRegistroForm(idSolicitud) {
            const form = document.getElementById('form-registro-' + idSolicitud);
            if (!form) return;
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        // Filtra el select de Municipio del mismo formulario para que solo muestre los
        // municipios que pertenecen al Departamento elegido (evita combinaciones inválidas).
        function filtrarMunicipios(selectDepartamento) {
            const opcionElegida = selectDepartamento.options[selectDepartamento.selectedIndex];
            const idDepartamento = opcionElegida ? opcionElegida.getAttribute('data-id') : '';
            const selectMunicipio = selectDepartamento.closest('form').querySelector('select[name="nombreMunicipio"]');
            selectMunicipio.value = '';
            Array.from(selectMunicipio.options).forEach(function (opcion) {
                if (!opcion.value) return; // deja visible el placeholder
                opcion.hidden = opcion.getAttribute('data-dept') !== idDepartamento;
            });
        }

        // Si el Gestor va a rechazar modalidad o formatos, exige que deje la novedad para notificar al aprendiz
        function validarNovedadRegistro(form) {
            const modalidadOk = form.querySelector('input[name="modalidadOk"]').checked;
            const formatosOk = form.querySelector('input[name="formatosOk"]').checked;
            const observacion = form.querySelector('textarea[name="observacion"]').value.trim();

            if ((!modalidadOk || !formatosOk) && !observacion) {
                alert('Debes escribir una novedad explicando el motivo del rechazo antes de continuar.');
                return false;
            }
            return true;
        }
    </script>
    <script th:src="@{/js/workflow.js}"></script>
</body>
</html>
