<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Soporte de Credenciales</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${usuario.menuNavegacion}, '/admin/credenciales')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>🔑 Soporte de Credenciales</h1>
                <p>Blanquea o resetea contraseñas de aprendices o funcionarios bloqueados.</p>
            </div>
            <div class="header-controls">
                <img th:if="${usuario.fotoPerfil != null and !#strings.isEmpty(usuario.fotoPerfil)}"
                     th:src="@{${usuario.fotoPerfil}}" alt="Foto de perfil" class="user-avatar-glow" style="object-fit:cover;">
                <div th:unless="${usuario.fotoPerfil != null and !#strings.isEmpty(usuario.fotoPerfil)}"
                     class="user-avatar-glow" th:text="${#strings.substring(usuario.nombre,0,1) + #strings.substring(usuario.apellido,0,1)}">AD</div>
            </div>
        </header>

        <section class="dashboard-grid">

            <div class="dashboard-panel" style="grid-column: 1 / -1; margin-top: 10px; max-width: 760px;">

                <div th:if="${exito}" style="margin-bottom: 16px; background: rgba(5, 112, 21, 0.08); border: 1px solid rgba(5, 112, 21, 0.25); color: var(--verde-sena); padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;" th:text="${exito}">OK</div>
                <div th:if="${error}" style="margin-bottom: 16px; background: rgba(220, 38, 38, 0.08); border: 1px solid rgba(220, 38, 38, 0.25); color: #DC2626; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;" th:text="${error}">Error</div>

                <!-- 🔎 Buscar usuario -->
                <h3 class="panel-header-title" style="margin: 0 0 14px 0;">🔎 Buscar Usuario</h3>
                <form th:action="@{/admin/credenciales}" method="get"
                      style="display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 24px;">
                    <div style="flex: 1; min-width: 260px;">
                        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted);">Documento o correo</label>
                        <input type="text" name="criterio" th:value="${criterio}" required placeholder="Ej: 1001234567 o usuario@correo.com"
                               style="width: 100%; padding: 10px 14px; border: 1px solid var(--card-border); border-radius: 10px; font-size: 13px; margin-top: 4px;">
                    </div>
                    <button type="submit" style="background: #2563EB; color: #fff; border: none; padding: 11px 22px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer;">Buscar</button>
                </form>

                <!-- 👤 Usuario encontrado + reset -->
                <div th:if="${usuarioEncontrado != null}" style="border: 1px solid var(--card-border); border-radius: 14px; padding: 20px;">
                    <div style="display: flex; align-items: center; gap: 14px; margin-bottom: 16px;">
                        <div class="user-avatar-glow" th:text="${#strings.substring(usuarioEncontrado.nombre,0,1) + #strings.substring(usuarioEncontrado.apellido,0,1)}">US</div>
                        <div>
                            <p style="font-weight: 800; color: var(--text-dark); margin: 0; font-size: 15px;"
                               th:text="${usuarioEncontrado.nombre + ' ' + usuarioEncontrado.apellido}">Nombre</p>
                            <p style="font-size: 12px; color: var(--text-muted); margin: 2px 0 0 0;"
                               th:text="${usuarioEncontrado.tipoDocumento + ' ' + usuarioEncontrado.documento + ' · ' + usuarioEncontrado.correoElectronico}">Datos</p>
                        </div>
                        <span th:if="${usuarioEncontrado.estado}" style="margin-left: auto; background: rgba(5, 112, 21, 0.1); color: var(--verde-sena); font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;">Cuenta Activa</span>
                        <span th:unless="${usuarioEncontrado.estado}" style="margin-left: auto; background: rgba(220, 38, 38, 0.1); color: #DC2626; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;">Cuenta Inactiva</span>
                    </div>

                    <form th:action="@{/admin/credenciales/reset}" method="post" style="display: flex; flex-direction: column; gap: 12px;">
                        <input type="hidden" name="documentoOCorreo" th:value="${usuarioEncontrado.documento}">
                        <div>
                            <label style="font-size: 12px; font-weight: 700; color: var(--text-muted);">Nueva contraseña (opcional)</label>
                            <input type="text" name="nuevaContrasena" placeholder="Déjalo vacío para blanquear: la contraseña vuelve a ser el documento"
                                   style="width: 100%; padding: 10px 14px; border: 1px solid var(--card-border); border-radius: 10px; font-size: 13px; margin-top: 4px;">
                        </div>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dark); font-weight: 600;">
                            <input type="checkbox" name="reactivarCuenta" value="true"
                                   th:checked="${!usuarioEncontrado.estado}">
                            Reactivar la cuenta en el mismo paso
                        </label>
                        <button type="submit" style="background: var(--verde-sena); color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;">
                            🔑 Aplicar Blanqueo / Reseteo
                        </button>
                    </form>
                </div>

                <p th:if="${usuarioEncontrado == null and #strings.isEmpty(criterio)}"
                   style="text-align: center; padding: 30px; color: var(--text-muted); font-size: 13px;">
                    Busca al usuario por documento o correo para gestionar sus credenciales.
                </p>
            </div>

        </section>
    </main>

</body>
</html>
