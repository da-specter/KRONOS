<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS | Mi Perfil</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <aside th:replace="~{fragments/sidebar :: sidebar(${usuario.menuNavegacion}, '/perfil')}"></aside>

    <main class="main-content">

        <header class="top-header-capsule">
            <div class="welcome-info">
                <h1>👤 Mi Perfil</h1>
                <p>Consulta y edita tus datos personales guardados en el sistema.</p>
            </div>

            <div th:replace="~{fragments/notificaciones :: campana}"></div>
        </header>

        <section class="dashboard-grid">

            <div class="alert-danger" th:if="${error}" th:text="${error}" style="grid-column: 1 / -1; margin-top: 0;"></div>
            <div class="alert-success" th:if="${exito}" th:text="${exito}" style="grid-column: 1 / -1; margin-top: 0;"></div>

            <div class="dashboard-panel" style="grid-column: 1 / -1;">
                <div style="display:flex; align-items:center; gap:16px; margin-bottom: 18px;">
                    <img th:if="${perfil.fotoPerfil != null and !#strings.isEmpty(perfil.fotoPerfil)}"
                         th:src="@{${perfil.fotoPerfil}}" alt="Foto de perfil"
                         style="width:56px; height:56px; border-radius:50%; object-fit:cover;">
                    <div th:unless="${perfil.fotoPerfil != null and !#strings.isEmpty(perfil.fotoPerfil)}"
                         class="user-avatar-glow" style="width:56px; height:56px; font-size:20px;"
                         th:text="${#strings.substring(perfil.nombre,0,1) + #strings.substring(perfil.apellido,0,1)}">DM</div>
                    <div>
                        <p style="font-size:17px; font-weight:700; color:var(--text-dark); margin:0;"
                           th:text="${perfil.nombre} + ' ' + ${perfil.apellido}">Nombre Apellido</p>
                        <p style="font-size:12px; color:var(--text-muted); margin-top:2px;"
                           th:text="${perfil.tipoDocumento} + ' ' + ${perfil.documento}">CC 1234567</p>
                    </div>
                </div>

                <form th:action="@{/perfil/foto}" method="post" enctype="multipart/form-data"
                      style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom: 22px; padding-bottom: 22px; border-bottom: 1px solid var(--card-border);">
                    <input type="file" name="foto" accept="image/*" required style="font-size: 13px;">
                    <button type="submit" class="btn-login" style="margin-top:0; width:auto; padding: 8px 18px; font-size: 13px;">Cambiar Foto</button>
                </form>

                <form th:action="@{/perfil/editar}" method="post">
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:18px;">
                        <div class="form-group">
                            <label>Nombre</label>
                            <div class="input-container">
                                <input type="text" name="nombre" th:value="${perfil.nombre}" maxlength="30" required pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ]+( [a-zA-ZáéíóúÁÉÍÓÚñÑüÜ]+)*" title="El nombre solo puede contener letras.">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Apellido</label>
                            <div class="input-container">
                                <input type="text" name="apellido" th:value="${perfil.apellido}" maxlength="30" required pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ]+( [a-zA-ZáéíóúÁÉÍÓÚñÑüÜ]+)*" title="El apellido solo puede contener letras.">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Correo Electrónico</label>
                            <div class="input-container">
                                <input type="email" name="correoElectronico" th:value="${perfil.correoElectronico}" maxlength="150" required pattern="[^@\s]+@[^@\s]*\.co[^@\s]*" title="El correo debe tener '@' y dominio '.co' (ej: usuario@sena.edu.co).">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <div class="input-container">
                                <input type="text" name="telefono" th:value="${perfil.telefono}" maxlength="11" pattern="\d+" inputmode="numeric" title="El teléfono solo puede contener números.">
                            </div>
                        </div>
                    </div>

                    <div style="margin-top: 26px; padding-top: 22px; border-top: 1px solid var(--card-border);">
                        <p style="font-size:13px; font-weight:700; color:var(--text-dark); margin-bottom:14px;">Cambiar Contraseña <span style="font-weight:400; color:var(--text-muted);">(opcional)</span></p>
                        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:18px;">
                            <div class="form-group">
                                <label>Contraseña Actual</label>
                                <div class="input-container">
                                    <input type="password" name="contrasenaActual" autocomplete="current-password">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Contraseña Nueva</label>
                                <div class="input-container">
                                    <input type="password" name="contrasenaNueva" autocomplete="new-password" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d.*\d)(?=.*[!@#$%]).*" title="Debe tener al menos una mayúscula, una minúscula, dos números y un carácter especial (! @ # $ %).">
                                </div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" style="margin-top: 24px;">Guardar Cambios</button>
                </form>
            </div>

        </section>
    </main>

    <script th:src="@{/js/workflow.js}"></script>
</body>
</html>
