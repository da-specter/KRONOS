<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- 🧭 Sidebar compartido por todas las vistas.
         Parámetros:
           - menuOpciones: lista de MenuDto de la sesión (los grupos traen hijos)
           - rutaActiva:   ruta de la vista actual para resaltar el ítem activo -->
    <aside class="sidebar" th:fragment="sidebar(menuOpciones, rutaActiva)">
        <div>
            <div class="sidebar-brand">
                <div class="brand-icon">Ⓚ</div>
                <div class="brand-text">
                    <h3>KRONOS</h3>
                    <p>SENA Centro CTAPT</p>
                </div>
                <!-- 🍔 Solo visible en móvil: despliega/oculta el menú de navegación -->
                <button type="button" class="menu-hamburguesa" onclick="toggleSidebarMovil()" aria-label="Abrir menú">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- 👤 Identidad de la sesión: nombre y rol del usuario logueado (se lee directo de la
                 sesión para que aparezca en TODAS las vistas sin cambiar la firma del fragmento) -->
            <div th:if="${session.usuarioSesion != null}"
                 style="margin: 0 4px 18px 4px; padding: 12px 14px; border-radius: 14px;
                        background: rgba(255, 255, 255, 0.10); border: 1px solid rgba(255, 255, 255, 0.18);
                        display: flex; align-items: center; gap: 11px; backdrop-filter: blur(4px);">
                <div style="width: 36px; height: 36px; border-radius: 50%;
                            background: linear-gradient(135deg, #FFFFFF, #D9F2DF); color: var(--verde-sena, #057015);
                            display: flex; align-items: center; justify-content: center; font-weight: 800;
                            font-size: 13px; flex-shrink: 0; box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);"
                     th:text="${#strings.substring(session.usuarioSesion.nombre, 0, 1) + #strings.substring(session.usuarioSesion.apellido, 0, 1)}">DQ</div>
                <div style="min-width: 0;">
                    <p style="margin: 0; font-size: 12.5px; font-weight: 700; color: #FFFFFF;
                              white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                       th:text="${session.usuarioSesion.nombre + ' ' + session.usuarioSesion.apellido}">Nombre Apellido</p>
                    <p style="margin: 4px 0 0 0; font-size: 9.5px; font-weight: 800; letter-spacing: 0.8px;
                              text-transform: uppercase; color: #A7E8B5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                       th:text="${session.usuarioSesion.rolesLegibles}">Rol</p>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a th:href="@{/index}" class="menu-item" th:classappend="${rutaActiva == '/index'} ? ' active' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Inicio</span>
                </a>

                <!-- 🏷️ Separador "MÓDULOS": ordena visualmente el sidebar distinguiendo el
                     Inicio fijo de las opciones propias de cada rol. Blanco neón, pequeño y
                     discreto pero perceptible, con la línea desvaneciéndose hacia la derecha. -->
                <div th:if="${!#lists.isEmpty(menuOpciones)}"
                     style="display: flex; align-items: center; gap: 9px; margin: 20px 10px 8px 10px;">
                    <span style="font-size: 10px; font-weight: 800; letter-spacing: 1.6px; color: #FFFFFF;
                                 text-shadow: 0 0 6px rgba(255,255,255,0.85), 0 0 14px rgba(255,255,255,0.45);
                                 white-space: nowrap;">MÓDULOS</span>
                    <span style="flex: 1; height: 1px;
                                 background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0));
                                 box-shadow: 0 0 6px rgba(255,255,255,0.6);"></span>
                </div>

                <th:block th:each="opcion : ${menuOpciones}">

                    <!-- 📂 Módulo desplegable con sub-ítems (Ej: Gestión Etapa) -->
                    <div th:if="${opcion.grupo}" class="menu-group"
                         th:classappend="${opcion.hijos.![ruta].contains(rutaActiva)} ? ' open' : ''">
                        <button type="button" class="menu-item menu-group-toggle" onclick="toggleMenuGrupo(this)"
                                th:classappend="${opcion.hijos.![ruta].contains(rutaActiva)} ? ' active' : ''">
                            <th:block th:insert="~{fragments/sidebar :: icono(${opcion.nombre})}"></th:block>
                            <span th:text="${opcion.nombre}">Módulo</span>
                            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div class="submenu">
                            <a th:each="hijo : ${opcion.hijos}" th:href="${hijo.ruta}" class="menu-item"
                               th:classappend="${hijo.ruta == rutaActiva} ? ' active' : ''">
                                <th:block th:insert="~{fragments/sidebar :: icono(${hijo.nombre})}"></th:block>
                                <span th:text="${hijo.nombre}">Sub-ítem</span>
                            </a>
                        </div>
                    </div>

                    <!-- 🔗 Ítem simple -->
                    <a th:unless="${opcion.grupo}" th:href="${opcion.ruta}" class="menu-item"
                       th:classappend="${opcion.ruta == rutaActiva} ? ' active' : ''">
                        <th:block th:insert="~{fragments/sidebar :: icono(${opcion.nombre})}"></th:block>
                        <span th:text="${opcion.nombre}">Opción Dinámica</span>
                    </a>
                </th:block>

                <a th:href="@{/auth/logout}" class="menu-item logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Cerrar Sesión</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <p>© 2026 - Power by KRONOS</p>
        </div>

        <!-- 📂 Funciones del sidebar. Viven DENTRO del fragmento para que funcionen
             en TODAS las vistas que lo usan (no todas cargan workflow.js). -->
        <script>
            // Despliega/colapsa un módulo con sub-ítems (Ej: Datos Maestros)
            function toggleMenuGrupo(boton) {
                const grupo = boton.closest('.menu-group');
                if (grupo) grupo.classList.toggle('open');
            }

            // 🍔 Móvil: muestra/oculta el menú completo desde el botón hamburguesa
            function toggleSidebarMovil() {
                const sidebar = document.querySelector('.sidebar');
                if (sidebar) sidebar.classList.toggle('abierto');
            }
        </script>
    </aside>

    <!-- 🎨 Ícono según el nombre del ítem del menú -->
    <th:block th:fragment="icono(nombre)" th:switch="${nombre}">

        <svg th:case="'Mi Perfil'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

            <circle cx="12" cy="7" r="4"></circle>

        <svg th:case="'Gestión Etapa'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        <svg th:case="'Gestión Fichas'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3v18"></path>

            <path d="M14 9h4"></path>
            <path d="M14 14h4"></path>

        <svg th:case="'Gestión Aprendices'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        <svg th:case="'Mi Cronograma'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>

        <svg th:case="'Subir Bitácoras'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

            <line x1="8" y1="11" x2="16" y2="11"></line>
            <line x1="8" y1="15" x2="13" y2="15"></line>
        </svg>

        <svg th:case="'Novedades'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l18-5v12L3 14v-3z"></path>
            <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path>
        </svg>

        <!-- 🛠️ Módulos exclusivos del Administrador -->

        <!-- Datos Maestros: base de datos (cilindros) -->

        <svg th:case="'Usuarios del Sistema'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        <!-- Gestión de Formatos: carpeta -->
        <svg th:case="'Gestión de Formatos'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        <!-- Sistema y Automatización: engranaje -->
