<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- 🧭 Sidebar compartido por todas las vistas.
         Parámetros:
           - menuOpciones: lista de MenuDto de la sesión (los grupos traen hijos)
           - rutaActiva:   ruta de la vista actual para resaltar el ítem activo -->
    <aside class="sidebar" th:fragment="sidebar(menuOpciones, rutaActiva)">
        <div>
            <div class="sidebar-brand">
                <div class="brand-icon">Ⓚ</div>
                <div class="brand-text">
                    <h3>KRONOS</h3>
                    <p>SENA Centro CTAPT</p>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a th:href="@{/index}" class="menu-item" th:classappend="${rutaActiva == '/index'} ? ' active' : ''">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span>Inicio</span>
                </a>

                <th:block th:each="opcion : ${menuOpciones}">

                    <!-- 📂 Módulo desplegable con sub-ítems (Ej: Gestión Etapa) -->
                    <div th:if="${opcion.grupo}" class="menu-group"
                         th:classappend="${opcion.hijos.![ruta].contains(rutaActiva)} ? ' open' : ''">
                        <button type="button" class="menu-item menu-group-toggle" onclick="toggleMenuGrupo(this)"
                                th:classappend="${opcion.hijos.![ruta].contains(rutaActiva)} ? ' active' : ''">
                            <th:block th:insert="~{fragments/sidebar :: icono(${opcion.nombre})}"></th:block>
                            <span th:text="${opcion.nombre}">Módulo</span>
                            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div class="submenu">
                            <a th:each="hijo : ${opcion.hijos}" th:href="${hijo.ruta}" class="menu-item"
                               th:classappend="${hijo.ruta == rutaActiva} ? ' active' : ''">
                                <th:block th:insert="~{fragments/sidebar :: icono(${hijo.nombre})}"></th:block>
                                <span th:text="${hijo.nombre}">Sub-ítem</span>
                            </a>
                        </div>
                    </div>

                    <!-- 🔗 Ítem simple -->
                    <a th:unless="${opcion.grupo}" th:href="${opcion.ruta}" class="menu-item"
                       th:classappend="${opcion.ruta == rutaActiva} ? ' active' : ''">
                        <th:block th:insert="~{fragments/sidebar :: icono(${opcion.nombre})}"></th:block>
                        <span th:text="${opcion.nombre}">Opción Dinámica</span>
                    </a>
                </th:block>

                <a th:href="@{/auth/logout}" class="menu-item logout">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Cerrar Sesión</span>
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <p>© 2026 - Power by KRONOS</p>
        </div>
    </aside>

    <!-- 🎨 Ícono según el nombre del ítem del menú -->
    <th:block th:fragment="icono(nombre)" th:switch="${nombre}">

        <svg th:case="'👤 Mi Perfil'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
        </svg>

        <svg th:case="'Gestión Etapa'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
        </svg>

        <svg th:case="'Gestión Fichas'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3v18"></path>
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <path d="M14 9h4"></path>
            <path d="M14 14h4"></path>
        </svg>

        <svg th:case="'Gestión Aprendices'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
        </svg>

        <svg th:case="'Asignar Instructores'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>

        <svg th:case="'🏢 Registro Etapa Productiva'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18"></path>
            <path d="M5 21V7l7-4 7 4v14"></path>
            <path d="M10 21v-4h4v4"></path>
        </svg>

        <svg th:case="'Validación de Documentos'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"></path>
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>

        <svg th:case="'📁 Formatos'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
        </svg>

        <svg th:case="'Mi Cronograma'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>

        <svg th:case="'Subir Bitácoras'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>

        <svg th:case="'Mis Aprendices'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>

        <svg th:case="'Agendar Visitas'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>

        <svg th:case="'📢 Novedades'" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l18-5v12L3 14v-3z"></path>
            <path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path>
        </svg>

        <svg th:case="*" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
    </th:block>

</body>
</html>
