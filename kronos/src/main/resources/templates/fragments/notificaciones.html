<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- 🔔 Campana de notificaciones compartida por todas las vistas de todos los roles.
         Lee del contexto de quien la invoca: usuario, notificaciones (historial completo,
         más recientes primero) y notificacionesNoLeidas (solo el subconjunto sin leer, usado
         únicamente para el contador rojo y para decidir si se ofrece "Marcar leídas").
         "Marcar leídas" solo cambia el campo LEIDO en Oracle: el historial completo permanece
         siempre visible en la campana, para cualquier rol, aunque ya esté leído. -->
    <div class="header-controls" th:fragment="campana" style="position: relative;">
        <div class="bell-btn-circle" style="position: relative; cursor: pointer;" onclick="toggleNotificaciones()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" th:stroke="${#lists.isEmpty(notificacionesNoLeidas)} ? 'currentColor' : '#DC2626'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span th:if="${!#lists.isEmpty(notificacionesNoLeidas)}"
                  style="position: absolute; top: -4px; right: -4px; background: #DC2626; color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 3px;"
                  th:text="${notificacionesNoLeidas.size()}">3</span>
        </div>

        <div id="panelNotificaciones" style="display: none; position: absolute; top: 46px; right: 46px; width: 320px; background: #fff; border: 1px solid var(--card-border); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 50; overflow: hidden;">
            <div style="padding: 14px 16px; border-bottom: 1px solid var(--card-border); font-weight: 700; font-size: 13px; color: var(--text-dark); display: flex; justify-content: space-between; align-items: center;">
                <span>Notificaciones</span>
                <form th:action="@{/notificaciones/marcar-leidas}" method="post" th:if="${!#lists.isEmpty(notificacionesNoLeidas)}">
                    <button type="submit" style="border: none; background: none; color: var(--verde-sena); font-size: 12px; font-weight: 600; cursor: pointer;">Marcar leídas</button>
                </form>
            </div>
            <div style="max-height: 320px; overflow-y: auto;">
                <a th:each="notificacion : ${notificaciones}"
                   th:href="@{'/notificaciones/' + ${notificacion.idNotificacion} + '/ir'}"
                   th:style="${notificacion.leido}
                              ? 'display: block; padding: 12px 16px; border-bottom: 1px solid var(--card-border); font-size: 13px; color: var(--text-muted); background: #FAFAFA; text-decoration: none; cursor: pointer;'
                              : 'display: block; padding: 12px 16px; border-bottom: 1px solid var(--card-border); font-size: 13px; color: var(--text-dark); text-decoration: none; cursor: pointer;'">
                    <div style="display: flex; align-items: flex-start; gap: 8px;">
                        <span th:unless="${notificacion.leido}"
                              style="width: 7px; height: 7px; margin-top: 5px; border-radius: 50%; background: #DC2626; flex-shrink: 0;"></span>
                        <p th:text="${notificacion.mensaje}" style="margin: 0; flex: 1;">Mensaje</p>
                    </div>
                    <span style="font-size: 11px; color: var(--text-muted); margin-left: 15px;" th:text="${#temporals.format(notificacion.fechaCreacion, 'dd/MM/yyyy HH:mm')}">01/01/2026</span>
                </a>
                <p th:if="${#lists.isEmpty(notificaciones)}" style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;">No tienes notificaciones.</p>
            </div>
        </div>

        <img th:if="${usuario.fotoPerfil != null and !#strings.isEmpty(usuario.fotoPerfil)}"
             th:src="@{${usuario.fotoPerfil}}" alt="Foto de perfil" class="user-avatar-glow" style="object-fit:cover;">
        <div th:unless="${usuario.fotoPerfil != null and !#strings.isEmpty(usuario.fotoPerfil)}"
             class="user-avatar-glow" th:text="${#strings.substring(usuario.nombre,0,1) + #strings.substring(usuario.apellido,0,1)}">DM</div>
    </div>

</body>
</html>
