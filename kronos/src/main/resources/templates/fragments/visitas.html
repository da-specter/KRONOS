<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

    <!-- 🧩 Tabla reutilizable para una franja de la agenda de visitas (pasadas/pendientes/futuras),
         usada tanto por el Instructor de Seguimiento (mi-agenda-visitas.html) como por el
         Aprendiz (mis-visitas-aprendiz.html). Este archivo nunca se sirve como página completa,
         solo se referencia via th:replace/th:insert, para que no se duplique al renderizar.
         mostrarAcciones=true agrega la columna de Cancelar/Aplazar y de evidencia (solo instructor). -->
    <table th:fragment="tablaVisitas(visitas, textoVacio, mostrarAcciones)" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="border-bottom: 2px solid var(--card-border); color: var(--text-muted); font-size: 12px; font-weight: 700;">
                <th style="padding: 10px 14px;">Fecha y hora</th>
                <th style="padding: 10px 14px;">Aprendiz</th>
                <th style="padding: 10px 14px;">Ficha</th>
                <th style="padding: 10px 14px;">Tipo</th>
                <th style="padding: 10px 14px;">Modalidad</th>
                <th style="padding: 10px 14px;">Estado</th>
                <th style="padding: 10px 14px;">Novedad</th>
                <th th:if="${mostrarAcciones}" style="padding: 10px 14px;"></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${visitas}" class="fila-visita" style="border-bottom: 1px solid var(--card-border); font-size: 13px;">
                <td style="padding: 10px 14px; font-weight: 700; color: var(--text-dark);" th:text="${v.fecha}">01/01/2026 08:00</td>
                <td style="padding: 10px 14px;" th:text="${v.aprendizNombre}">Nombre</td>
                <td style="padding: 10px 14px;" th:text="${v.ficha}">2555228</td>
                <td style="padding: 10px 14px;" th:text="${v.tipoEtiqueta}">Inicial</td>
                <td style="padding: 10px 14px;" th:text="${v.modalidadEtiqueta}">Presencial</td>
                <td style="padding: 10px 14px;">
                    <span th:text="${v.estadoEtiqueta}"
                          th:style="${v.estado == 'PLANEADA'} ? 'background: rgba(217,119,6,0.12); color: #D97706; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;'
                                   : (${v.estado == 'REALIZADA'} ? 'background: rgba(5,112,21,0.1); color: var(--verde-sena); font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;'
                                   : (${v.estado == 'REPROGRAMADA'} ? 'background: rgba(37,99,235,0.12); color: #2563EB; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;'
                                   : 'background: rgba(220,38,38,0.1); color: #DC2626; font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 700;'))">Planeada</span>
                </td>
                <td style="padding: 10px 14px; max-width: 220px; color: var(--text-muted);" th:text="${v.novedad != null ? v.novedad : '—'}">—</td>
                <td th:if="${mostrarAcciones}" style="padding: 10px 14px; white-space: nowrap;">
                    <div th:if="${v.puedeGestionar}" style="display: flex; gap: 6px;">
                        <button type="button" class="btn-gestionar-visita" th:data-idvisita="${v.idVisita}" data-accion="APLAZAR"
                                style="background: rgba(37,99,235,0.1); color: #2563EB; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;">
                            Aplazar
                        </button>
                        <button type="button" class="btn-gestionar-visita" th:data-idvisita="${v.idVisita}" data-accion="CANCELAR"
                                style="background: rgba(220,38,38,0.1); color: #DC2626; border: none; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;">
                            Cancelar
                        </button>
                    </div>
                    <div th:if="${v.estado == 'REALIZADA'}" style="display: flex; align-items: center; gap: 8px;">
                        <a th:if="${v.evidenciaRuta != null}" th:href="@{${v.evidenciaRuta}}" target="_blank"
                           title="Ver evidencia" style="text-decoration: none; font-size: 15px;">👁</a>
                        <form th:action="@{/instructor/visitas/evidencia}" method="post" enctype="multipart/form-data" style="margin: 0; display: inline;">
                            <input type="hidden" name="idVisita" th:value="${v.idVisita}">
                            <label th:title="${v.evidenciaRuta != null} ? 'Reemplazar evidencia' : 'Subir evidencia'" style="cursor: pointer; font-size: 15px;">📎
                                <input type="file" name="archivo" accept=".pdf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png"
                                       style="display: none;" onchange="this.form.submit()">
                            </label>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(visitas)}">
                <td th:colspan="${mostrarAcciones} ? 8 : 7" style="text-align: center; padding: 24px; color: var(--text-muted); font-weight: 500;" th:text="${textoVacio}">Sin visitas.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
